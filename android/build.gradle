buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath "com.android.tools.build:gradle:8.1.1"
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22"
  }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

// Brings in the nitrogen-generated Kotlin sources and warns if they're missing.
apply from: '../nitrogen/generated/android/BlurredVideo+autolinking.gradle'

android {
  namespace "com.margelo.nitro.blurredvideo"
  compileSdkVersion 34

  buildFeatures {
    // Required: fbjni / ReactAndroid / nitro-modules ship their C++ via prefab AARs.
    prefab true
  }

  defaultConfig {
    minSdkVersion 26
    targetSdkVersion 34

    externalNativeBuild {
      cmake {
        cppFlags "-O2 -frtti -fexceptions -Wall -Wno-unused-variable -fstack-protector-all"
        arguments "-DANDROID_STL=c++_shared"
        abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
      }
    }
  }

  externalNativeBuild {
    cmake {
      path "CMakeLists.txt"
    }
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = "17"
  }

  sourceSets {
    main {
      java.srcDirs += [
        "src/main/java",
        "${project.buildDir}/generated/source/codegen/java"
      ]
    }
  }

  // Skip stripping debug symbols to keep crash stacks readable.
  packagingOptions {
    doNotStrip '**/libBlurredVideo.so'
  }
}

repositories {
  google()
  mavenCentral()
}

dependencies {
  implementation "com.facebook.react:react-android"
  implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"

  implementation "androidx.media3:media3-exoplayer:1.3.1"
  implementation "androidx.media3:media3-ui:1.3.1"
  implementation "androidx.media3:media3-common:1.3.1"

  implementation "io.coil-kt:coil:2.6.0"

  implementation project(":react-native-nitro-modules")
}
